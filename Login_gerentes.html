<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Supervisor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background: url("Fondo.png") no-repeat center center/cover;
color:rgb(255, 255, 255);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#111;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 10px rgba(255,0,0,0.2);
}

h2{
margin-bottom:20px;
}

label{
color:red;
display:block;
text-align:left;
margin-top:10px;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:#222;
color:white;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:red;
border:none;
border-radius:5px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#cc0000;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Supervisor</h2>

<label>Email</label>
<input type="email" id="correo" placeholder="Ingresa tu email">

<label>Password</label>
<input type="password" id="password" placeholder="Ingresa tu contraseña">

<button onclick="login()">Entrar</button>

<script src="Login_gerentes.js"></script>


</div>

</body>
</html>
