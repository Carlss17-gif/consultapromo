<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Supervisor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background: url("Fondo.png") no-repeat center center/cover;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* CONTENEDOR MÁS BONITO */
.login-box{
background: rgba(0, 0, 0, 0.85); /* fondo más elegante */
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(255, 255, 0, 0.3); /* brillo amarillo */
backdrop-filter: blur(5px); /* efecto vidrio */
}

/* TÍTULO EN AMARILLO */
h2{
margin-bottom:20px;
color:yellow;
text-shadow:0 0 5px rgba(255,255,0,0.7);
}

label{
color:yellow;
display:block;
text-align:left;
margin-top:10px;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:#222;
color:white;
margin-bottom:10px;
outline:none;
}

input:focus{
box-shadow:0 0 5px yellow;
}

/* BOTÓN */
button{
width:100%;
padding:12px;
background:yellow;
border:none;
border-radius:5px;
color:black;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#e6c200;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="login-box">

<h2>Supervisor</h2>

<label>Email</label>
<input type="email" id="correo" placeholder="Ingresa tu email">

<label>Password</label>
<input type="password" id="password" placeholder="Ingresa tu contraseña">

<button onclick="login()">Entrar</button>

<script src="Login_gerentes.js"></script>


</div>

</body>
</html>
