<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Panel Gerente</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
border-bottom:2px solid #ffcc00;
}

.logo{
font-size:20px;
font-weight:bold;
color:#ffcc00;
}

.container{
max-width:500px;
margin:40px auto;
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #333;
}

h2{
color:#ffcc00;
}

.info{
background:#000;
padding:15px;
border-radius:8px;
margin-bottom:15px;
border:1px solid #333;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#ffcc00;
color:black;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e6b800;
}

</style>

</head>

<body>

<div class="navbar">
<div class="logo">🍔 Carls Jr - Panel Gerente</div>
</div>

<div class="container">

<h2>Información del Cliente</h2>

<div class="info" id="infoCliente">
Cargando información...
</div>

<h2>Canjear Cupón</h2>

<input type="text" id="transaccion" placeholder="Número de transacción">
<input type="date" id="fecha">
<input type="time" id="hora">

<button onclick="canjear()">Validar Cupón</button>

</div>
<script src="Panel.js"></script>

</body>
</html>
